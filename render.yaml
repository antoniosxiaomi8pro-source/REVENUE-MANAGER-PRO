services:
  - type: web
    name: hotel-revenue-agent
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_WORKFLOW_ID
        sync: false
      - key: OPENAI_WORKFLOW_VERSION
        sync: false
      - key: OPENAI_WORKFLOW_STANDARD
        sync: false
      - key: OPENAI_WORKFLOW_STANDARD_VERSION
        sync: false
      - key: OPENAI_WORKFLOW_ADVANCED
        sync: false
      - key: OPENAI_WORKFLOW_ADVANCED_VERSION
        sync: false
      - key: OPENAI_WORKFLOW_GROUP
        sync: false
      - key: OPENAI_WORKFLOW_GROUP_VERSION
        sync: false
      - key: HOST
        value: 0.0.0.0
