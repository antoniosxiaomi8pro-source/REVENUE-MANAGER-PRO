<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Chat</title>
  <script src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js" async></script>
  <style>
    :root {
      color-scheme: light;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(135deg, #f4ede2 0%, #f9f7f3 45%, #e7eef5 100%);
      color: #1d1d1b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(100%, 960px);
      display: grid;
      gap: 20px;
      grid-template-columns: 320px minmax(0, 1fr);
      align-items: start;
    }

    .card {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(29, 29, 27, 0.08);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(54, 54, 45, 0.08);
      padding: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.5;
    }

    code {
      background: #f1ece3;
      padding: 2px 6px;
      border-radius: 8px;
    }

    #chat {
      width: 100%;
      min-height: 720px;
      display: block;
    }

    @media (max-width: 860px) {
      .shell {
        grid-template-columns: 1fr;
      }

      #chat {
        min-height: 620px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <h1>Το workflow σου</h1>
      <p>Αυτή η σελίδα δεν μιλάει με απλό prompt.</p>
      <p>Μιλάει με το published workflow σου από το Agent Builder μέσω <code>workflow id</code>.</p>
    </section>

    <section class="card">
      <openai-chatkit id="chat"></openai-chatkit>
    </section>
  </main>

  <script>
    function bootChatKit() {
      const chat = document.getElementById("chat");

      if (!chat || typeof chat.setOptions !== "function") {
        window.setTimeout(bootChatKit, 250);
        return;
      }

      chat.setOptions({
        api: {
          async getClientSecret() {
            const response = await fetch("/api/chatkit/session", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              }
            });

            const data = await response.json();
            if (!response.ok) {
              console.error("Session error", data);
              throw new Error(data.error || "Could not create ChatKit session");
            }

            return data.client_secret;
          }
        }
      });
    }

    bootChatKit();
  </script>
</body>
</html>
