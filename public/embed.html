<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Chat</title>
  <script src="https://cdn.platform.openai.com/deployments/chatkit/chatkit.js" async></script>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: relative;
      overflow: hidden;
    }

    #status {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(17, 27, 47, 0.12);
      color: #39465f;
      font-size: 0.9rem;
      line-height: 1.2;
      box-shadow: 0 12px 30px rgba(10, 20, 36, 0.08);
      display: none;
      pointer-events: none;
    }

    #status.visible {
      display: block;
    }

    #chat {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div id="status" class="visible">Φορτώνω το chat...</div>
  <openai-chatkit id="chat"></openai-chatkit>

  <script>
    const params = new URLSearchParams(window.location.search);
    const agentId = params.get("agent");

    function setStatus(message) {
      const status = document.getElementById("status");
      status.textContent = message;
      status.classList.add("visible");
    }

    function clearStatus() {
      document.getElementById("status").classList.remove("visible");
    }

    async function waitForChatKit(element) {
      for (let attempt = 0; attempt < 60; attempt += 1) {
        if (element && typeof element.setOptions === "function") {
          return true;
        }
        await new Promise((resolve) => window.setTimeout(resolve, 250));
      }
      return false;
    }

    async function boot() {
      const chat = document.getElementById("chat");
      const ready = await waitForChatKit(chat);
      if (!ready) {
        setStatus("Το chat widget δεν φόρτωσε σωστά.");
        return;
      }

      chat.setOptions({
        api: {
          async getClientSecret() {
            const response = await fetch("/api/chatkit/session", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ agent_id: agentId })
            });

            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.error || "Could not create ChatKit session");
            }

            clearStatus();
            return data.client_secret;
          }
        }
      });
    }

    window.addEventListener("error", () => {
      setStatus("Υπάρχει πρόβλημα με το chat widget.");
    });

    window.addEventListener("unhandledrejection", (event) => {
      setStatus(event.reason?.message || "Δεν μπόρεσα να ξεκινήσω τη συνομιλία.");
    });

    boot();
  </script>
</body>
</html>
